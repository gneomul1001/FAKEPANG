<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAKEPANG</title>

  <!-- HTTPS 보안 설정용 (배포 시 서버에서도 HTTPS 적용 필요) -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#111;
      padding-bottom:90px;
    }

    /* 상단 */
    .top-header{
      background:white;
      padding:14px;
      position:sticky;
      top:0;
      z-index:100;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
    }

    .logo{
      font-size:36px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .logo span:nth-child(1){color:#ff6600;}
    .logo span:nth-child(2){color:#00a2ff;}
    .logo span:nth-child(3){color:#00cc66;}

    .search-box{
      display:flex;
      gap:10px;
    }

    .search-box input{
      flex:1;
      padding:14px;
      border-radius:40px;
      border:3px solid black;
      font-size:16px;
    }

    .search-box button{
      padding:0 18px;
      border:none;
      border-radius:30px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

    /* 배너 */
    .main-banner{
      margin:14px;
      background:linear-gradient(120deg,#e9f4ff,#ffffff);
      border-radius:18px;
      padding:30px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }

    /* 섹션 */
    .section{
      margin:14px;
    }

    .section-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:14px;
    }

    /* 상품 카드 */
    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
      gap:14px;
    }

    .product{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
      transition:0.2s;
    }

    .product:hover{
      transform:translateY(-4px);
    }

    .product img{
      width:100%;
      height:170px;
      object-fit:cover;
      background:#ddd;
    }

    .product-body{
      padding:12px;
    }

    .product-name{
      font-size:15px;
      margin-bottom:8px;
      min-height:40px;
    }

    .price{
      color:#e11d48;
      font-weight:bold;
      font-size:20px;
    }

    .add-cart{
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:10px;
      cursor:pointer;
    }

    /* 상품 등록 */
    .upload-box{
      background:white;
      margin:14px;
      border-radius:18px;
      padding:20px;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
    }

    .upload-box input{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:1px solid #ddd;
      border-radius:10px;
    }

    .upload-box button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    /* 카테고리 페이지 */
    .category-layout{
      display:flex;
      height:350px;
      background:white;
      border-radius:18px;
      overflow:hidden;
      margin:14px;
    }

    .main-categories{
      width:35%;
      background:#f1f1f1;
      overflow-y:auto;
      border-right:1px solid #ddd;
    }

    .sub-categories{
      width:65%;
      overflow-y:auto;
      padding:10px;
    }

    .cat-item{
      padding:16px;
      border-bottom:1px solid #ddd;
      cursor:pointer;
    }

    .cat-item:hover{
      background:#e5e5e5;
    }

    .sub-item{
      background:#f7f7f7;
      padding:14px;
      border-radius:12px;
      margin-bottom:10px;
    }

    /* 배송 진행 */
    .delivery-box{
      background:white;
      margin:14px;
      padding:20px;
      border-radius:18px;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
    }

    .progress{
      width:100%;
      height:22px;
      background:#ddd;
      border-radius:30px;
      overflow:hidden;
      margin-top:15px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#2563eb,#00c2ff);
      transition:1s;
    }

    .delivery-status{
      margin-top:14px;
      font-size:18px;
      font-weight:bold;
    }

    /* 하단 메뉴 */
    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:white;
      display:flex;
      justify-content:space-around;
      padding:12px 0;
      box-shadow:0 -2px 8px rgba(0,0,0,0.08);
      z-index:999;
    }

    .nav-item{
      text-align:center;
      font-size:14px;
      cursor:pointer;
    }

    .nav-icon{
      font-size:24px;
      margin-bottom:4px;
    }

    @media(max-width:700px){
      .category-layout{
        flex-direction:column;
        height:auto;
      }

      .main-categories,
      .sub-categories{
        width:100%;
        max-height:220px;
      }
    }
  </style>
</head>
<body>

  <!-- 상단 -->
  <div class="top-header">
    <div class="logo">
      <span>FAKE</span><span>P</span><span>ANG</span>
    </div>

    <div class="search-box">
      <input type="text" placeholder="FAKEPANG에서 검색하세요!">
      <button>검색</button>
    </div>
  </div>

  <!-- 메인 배너 -->
  <div class="main-banner">
    오늘도 FAKE한 초특가 🔥
  </div>

  <!-- 상품 업로드 -->
  <div class="upload-box">
    <h2 style="margin-bottom:15px;">상품 추가</h2>

    <input type="text" id="productName" placeholder="상품 이름">
    <input type="number" id="productPrice" placeholder="가격">
    <input type="file" id="productImage">

    <button onclick="addProduct()">상품 등록</button>
  </div>

  <!-- 추천상품 -->
  <div class="section">
    <div class="section-title">추천상품</div>

    <div class="product-grid" id="productGrid">

      <div class="product">
        <img src="https://picsum.photos/300/300?1">
        <div class="product-body">
          <div class="product-name">FAKE 블루투스 이어폰</div>
          <div class="price">19,900원</div>
          <button class="add-cart" onclick="startDelivery()">구매하기</button>
        </div>
      </div>

      <div class="product">
        <img src="https://picsum.photos/300/300?2">
        <div class="product-body">
          <div class="product-name">초특가 가짜 운동화</div>
          <div class="price">29,900원</div>
          <button class="add-cart" onclick="startDelivery()">구매하기</button>
        </div>
      </div>

    </div>
  </div>

  <!-- 관심상품 -->
  <div class="section">
    <div class="section-title">관심상품</div>

    <div class="product-grid">

      <div class="product">
        <img src="https://picsum.photos/300/300?3">
        <div class="product-body">
          <div class="product-name">FAKEPANG 한정 자전거</div>
          <div class="price">99,000원</div>
        </div>
      </div>

      <div class="product">
        <img src="https://picsum.photos/300/300?4">
        <div class="product-body">
          <div class="product-name">미스터리 랜덤박스</div>
          <div class="price">7,900원</div>
        </div>
      </div>

    </div>
  </div>

  <!-- 카테고리 -->
  <div class="section">
    <div class="section-title">카테고리</div>

    <div class="category-layout">

      <div class="main-categories" id="mainCategories"></div>

      <div class="sub-categories" id="subCategories"></div>

    </div>
  </div>

  <!-- 배송 진행 -->
  <div class="delivery-box">
    <h2>배달 진행상황</h2>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="delivery-status" id="deliveryStatus">
      주문 대기중
    </div>

    <p style="margin-top:12px;color:#666;">
      ※ 이 사이트는 가짜 쇼핑몰이며 실제 배송되지 않습니다.
    </p>
  </div>

  <!-- 하단 -->
  <div class="bottom-nav">

    <div class="nav-item">
      <div class="nav-icon">🏠</div>
      홈
    </div>

    <div class="nav-item">
      <div class="nav-icon">📂</div>
      카테고리
    </div>

    <div class="nav-item">
      <div class="nav-icon">🔍</div>
      검색
    </div>

    <div class="nav-item">
      <div class="nav-icon">🛒</div>
      장바구니
    </div>

  </div>

  <script>

    // 카테고리 데이터
    const categoryData = {
      "패션의류": [
        "티셔츠",
        "바지",
        "신발",
        "모자",
        "가방"
      ],

      "전자제품": [
        "이어폰",
        "스마트폰",
        "노트북",
        "키보드"
      ],

      "식품": [
        "과자",
        "음료",
        "라면",
        "냉동식품"
      ],

      "생활용품": [
        "휴지",
        "세제",
        "샴푸",
        "수건"
      ]
    };

    const mainBox = document.getElementById("mainCategories");
    const subBox = document.getElementById("subCategories");

    // 카테고리 렌더
    function renderCategories(){

      mainBox.innerHTML = "";

      Object.keys(categoryData).forEach(cat => {

        const div = document.createElement("div");
        div.className = "cat-item";
        div.innerText = cat;

        div.onclick = () => showSubCategories(cat);

        mainBox.appendChild(div);

      });

      showSubCategories(Object.keys(categoryData)[0]);
    }

    // 하위 카테고리 표시
    function showSubCategories(cat){

      subBox.innerHTML = "";

      categoryData[cat].forEach(sub => {

        const div = document.createElement("div");
        div.className = "sub-item";
        div.innerText = sub;

        subBox.appendChild(div);

      });

    }

    renderCategories();

    // 상품 등록
    function addProduct(){

      const name = document.getElementById("productName").value;
      const price = document.getElementById("productPrice").value;
      const imageInput = document.getElementById("productImage");

      if(!name || !price || !imageInput.files[0]){
        alert("모든 정보를 입력하세요!");
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e){

        const grid = document.getElementById("productGrid");

        const card = document.createElement("div");
        card.className = "product";

        card.innerHTML = `
          <img src="${e.target.result}">
          <div class="product-body">
            <div class="product-name">${name}</div>
            <div class="price">${Number(price).toLocaleString()}원</div>
            <button class="add-cart" onclick="startDelivery()">구매하기</button>
          </div>
        `;

        grid.prepend(card);

      };

      reader.readAsDataURL(imageInput.files[0]);

      document.getElementById("productName").value = "";
      document.getElementById("productPrice").value = "";
      document.getElementById("productImage").value = "";

      alert("상품이 추가되었습니다!");
    }

    // 배송 진행
    function startDelivery(){

      const bar = document.getElementById("progressBar");
      const status = document.getElementById("deliveryStatus");

      let progress = 0;

      const steps = [
        "주문 확인중",
        "상품 준비중",
        "배송 출발",
        "배송중",
        "거의 도착",
        "배달 완료인 척 하는 중"
      ];

      let index = 0;

      const interval = setInterval(() => {

        progress += 20;

        if(progress > 100){
          clearInterval(interval);

          status.innerText = "배송 완료처럼 보이지만 실제로 오지 않습니다.";
          return;
        }

        bar.style.width = progress + "%";

        status.innerText = steps[index];

        index++;

      }, 1200);

    }

  </script>

</body>
</html>
